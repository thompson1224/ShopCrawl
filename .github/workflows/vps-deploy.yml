name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Oracle Cloud VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          BASE_URL: ${{ secrets.BASE_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs:
            SECRET_KEY,NAVER_CLIENT_ID,NAVER_CLIENT_SECRET,GOOGLE_API_KEY,ADMIN_SECRET,BASE_URL
          script: |
            set -euo pipefail
            cd /home/ubuntu/ShopCrawl

            sudo mkdir -p /opt/shopcrawl/data /opt/shopcrawl/chroma_db
            
            # Create .env file with secrets
            sudo tee .env > /dev/null << ENDFILE
            APP_ENV=production
            PORT=8000
            SECRET_KEY=$SECRET_KEY
            NAVER_CLIENT_ID=$NAVER_CLIENT_ID
            NAVER_CLIENT_SECRET=$NAVER_CLIENT_SECRET
            GOOGLE_API_KEY=$GOOGLE_API_KEY
            ADMIN_SECRET=$ADMIN_SECRET
            BASE_URL=$BASE_URL
            ENDFILE
            
            sudo git pull origin main
            sudo docker-compose -f docker-compose.production.yml down
            sudo docker-compose -f docker-compose.production.yml up -d --build
            sleep 10
            curl -fsS http://127.0.0.1:8000/health
            sudo docker image prune -f
