<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>딜냥이 - 핫딜 정보 포털</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* iOS safe area support */
        html {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: 100dvh; /* Dynamic viewport height for iOS */
            margin: 0;
            padding: 0;
            padding-top: max(0.75rem, env(safe-area-inset-top));
            padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
            padding-left: max(0.75rem, env(safe-area-inset-left));
            padding-right: max(0.75rem, env(safe-area-inset-right));
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 하단 탭 바 패딩 */
        @media (max-width: 640px) {
            body {
                padding-bottom: calc(4rem + env(safe-area-inset-bottom));
            }
        }
        
        .source-btn.active { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .deal-item-container {
            transition: all 0.2s ease;
        }
        .deal-item-container:active { 
            transform: scale(0.98);
        }
        .profile-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 0.5rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 0.5rem;
            min-width: 200px;
            z-index: 50;
        }
        .profile-container:hover .profile-dropdown {
            display: block;
        }
        .naver-login-btn {
            background: #03C75A;
            transition: all 0.3s;
        }
        .naver-login-btn:hover {
            background: #02B350;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        /* 소스 버튼 가로 스크롤 */
        .source-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            -ms-overflow-style: none;
            /* iOS 100vw fix */
            width: 100vw;
            margin-left: max(-0.75rem, calc(-1 * env(safe-area-inset-left)));
            padding-left: max(0.75rem, env(safe-area-inset-left));
            padding-right: max(0.75rem, env(safe-area-inset-right));
        }
        .source-scroll::-webkit-scrollbar {
            display: none;
        }
        
        /* 모바일 최적화 */
        @media (max-width: 640px) {
            body {
                padding-top: max(0.5rem, env(safe-area-inset-top));
                padding-bottom: max(0.5rem, env(safe-area-inset-bottom));
                padding-left: max(0.5rem, env(safe-area-inset-left));
                padding-right: max(0.5rem, env(safe-area-inset-right));
            }
            .container {
                width: 100%;
                padding: 0;
            }
            .source-btn {
                padding: 0.5rem 0.75rem;
                font-size: 0.75rem;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .text-3xl {
                font-size: 1.5rem;
            }
            /* 페이지네이션 버튼 확대 */
            .page-btn {
                min-width: 2.5rem;
                min-height: 2.5rem;
                font-size: 0.875rem;
            }
        }
        
        /* 고양이 발자국 애니메이션 */
        .paw-print {
            display: inline-block;
            font-size: 1.5rem;
            animation: paw-bounce 0.6s infinite;
        }
        .paw-print:nth-child(1) { animation-delay: 0s; }
        .paw-print:nth-child(2) { animation-delay: 0.2s; }
        .paw-print:nth-child(3) { animation-delay: 0.4s; }

        @keyframes paw-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 다크 모드 스타일 */
        .dark body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .dark .glass-morphism {
            background: rgba(30, 30, 50, 0.95);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .dark .source-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #1f2937;
            border-color: #e5e7eb;
        }
        .dark .text-gray-700 { color: #d1d5db; }
        .dark .text-gray-500 { color: #9ca3af; }
        .dark .text-gray-800 { color: #f3f4f6; }
        .dark .border-gray-200 { border-color: #374151; }
        .dark .bg-white { background-color: #1f2937; }
        .dark .bg-gray-50 { background-color: #1f2937; }
        .dark .bg-gray-100 { background-color: #374151; }
        .dark .bg-purple-50 { background-color: #2e1065; }
        .dark .bg-purple-100 { background-color: #3b1d6e; }
        
        /* 다크 모드 토글 버튼 */
        .dark-toggle {
            transition: all 0.3s ease;
        }
        .dark-toggle:hover {
            transform: scale(1.1);
        }
        
        /* 필터 접기/펼치기 */
        .filter-toggle {
            transition: transform 0.2s ease;
        }
        .filter-toggle.collapsed {
            transform: rotate(-90deg);
        }
        
        /* 스와이프 힌트 */
        .swipe-hint {
            animation: swipe-hint 1.5s ease-in-out infinite;
        }
        @keyframes swipe-hint {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-5px); }
        }
        
        /* iOS Safari 100vw overflow fix */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(0.75rem, env(safe-area-inset-left));
                padding-right: max(0.75rem, env(safe-area-inset-right));
            }
        }
        
        /* container 안전 영역 적용 */
        .container {
            max-width: 100%;
            overflow-x: hidden;
            padding-left: max(0.75rem, env(safe-area-inset-left));
            padding-right: max(0.75rem, env(safe-area-inset-right));
        }

        /* Toast 애니메이션 */
        @keyframes toast-in {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .toast-container {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            pointer-events: none;
        }
        .toast {
            pointer-events: auto;
            animation: toast-in 0.3s ease-out;
            min-width: 250px;
            max-width: 90vw;
        }

        /* 스켈레톤 로딩 애니메이션 */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, #2d3748 25%, #4a5568 50%, #2d3748 75%);
            background-size: 200% 100%;
        }
        </style>
        </head>
        <body>
        <!-- Toast 컨테이너 -->
        <div id="toast-container" class="toast-container"></div>

        <div class="container mx-auto max-w-7xl">
        <!-- 헤더 -->
        <div class="glass-morphism rounded-2xl p-4 sm:p-6 mb-4 sm:mb-6 shadow-xl">
            <div class="flex flex-col gap-3">
                <div class="flex items-center justify-between">
                    <div>
                        <h1 class="text-2xl sm:text-3xl font-bold bg-gradient-to-r from-purple-600 to-blue-500 bg-clip-text text-transparent">
                            🐱 딜냥이
                        </h1>
                        <p class="text-xs sm:text-sm text-gray-500 mt-0.5">핫딜 정보를 쉽게 찾는다냥!</p>
                    </div>
                    
                    <div class="flex items-center gap-2">
                        <!-- 다크 모드 토글 -->
                        <button id="darkModeToggle" onclick="toggleDarkMode()" class="dark-toggle p-2 rounded-xl bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-yellow-400">
                            <svg id="sunIcon" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                            </svg>
                            <svg id="moonIcon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                            </svg>
                        </button>
                        
                        <!-- 모바일 메뉴 버튼 -->
                        <button id="mobileMenuBtn" class="sm:hidden p-2 rounded-xl bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <!-- 로그인/사용자 정보 -->
                <div id="auth-section" class="flex items-center justify-between sm:justify-end">
                    <button id="loginBtn" onclick="naverLogin()" class="naver-login-btn px-4 py-2 text-white font-semibold rounded-xl shadow flex items-center gap-2 text-sm">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M16.273 12.845L7.376 0H0v24h7.726V11.156L16.624 24H24V0h-7.727v12.845z"/>
                        </svg>
                        <span>네이버 로그인</span>
                    </button>
                    
                    <div id="userInfo" class="hidden profile-container relative">
                        <div class="flex items-center gap-2 bg-white dark:bg-gray-800 rounded-xl px-3 py-2 cursor-pointer">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-500 to-blue-500 flex items-center justify-center text-white font-bold text-sm">
                                <span id="profileInitial"></span>
                            </div>
                            <img id="profileImg" src="" class="w-8 h-8 rounded-full border-2 border-purple-500 hidden">
                            <span id="username" class="font-semibold text-gray-800 dark:text-gray-200 text-sm"></span>
                        </div>
                        
                        <div class="profile-dropdown">
                            <div class="px-3 py-2 border-b border-gray-100 dark:border-gray-700">
                                <p id="userEmail" class="text-sm font-medium text-gray-800 dark:text-gray-200"></p>
                            </div>
                            <button onclick="openTelegramSettings()" class="w-full text-left px-3 py-2 text-sm text-blue-600 hover:bg-blue-50 dark:hover:bg-blue-900 rounded-lg">
                                📱 Telegram 알림 설정
                            </button>
                            <button onclick="logout()" class="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 dark:hover:bg-red-900 rounded-lg">
                                🚪 로그아웃
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 검색창 (일반 검색) -->
        <div class="glass-morphism rounded-2xl p-4 mb-4 shadow-lg" id="search-container">
            <div class="relative flex items-center">
                <span class="absolute left-3 text-xl">🔍</span>
                <input type="text" id="searchInput" 
                    class="w-full pl-10 pr-12 py-3 bg-white/80 dark:bg-gray-800/80 border-2 border-purple-100 dark:border-gray-700 rounded-xl focus:outline-none focus:border-purple-500 text-gray-700 dark:text-gray-200 placeholder-gray-400 text-sm sm:text-base"
                    placeholder="핫딜 검색... 예: 노트북, 냉장고"
                    onkeypress="if(event.key === 'Enter') performSearch()">
                <button onclick="performSearch()" 
                    class="absolute right-1.5 p-2 bg-gradient-to-r from-purple-500 to-blue-500 rounded-lg text-white active:scale-95 transition-transform">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- 소스 필터 (가로 스크롤) -->
        <div class="mb-4">
            <div id="source-buttons" class="source-scroll flex gap-2 pb-2">
                <button data-source="all" class="source-btn px-4 py-2.5 bg-white text-gray-700 rounded-xl shadow font-semibold border border-gray-200 active flex-shrink-0">
                    🔥 전체
                </button>
                <button data-source="뽐뿌" class="source-btn px-4 py-2.5 bg-white text-gray-700 rounded-xl shadow font-semibold border border-gray-200 flex-shrink-0">
                    💰 뽐뿌
                </button>
                <button data-source="루리웹" class="source-btn px-4 py-2.5 bg-white text-gray-700 rounded-xl shadow font-semibold border border-gray-200 flex-shrink-0">
                    🎮 루리웹
                </button>
                <button data-source="Zod" class="source-btn px-4 py-2.5 bg-white text-gray-700 rounded-xl shadow font-semibold border border-gray-200 flex-shrink-0">
                    🛒 Zod
                </button>
                <button data-source="어미새" class="source-btn px-4 py-2.5 bg-white text-gray-700 rounded-xl shadow font-semibold border border-gray-200 flex-shrink-0">
                    🐦 어미새
                </button>
                <button data-source="퀘이사존" class="source-btn px-4 py-2.5 bg-white text-gray-700 rounded-xl shadow font-semibold border border-gray-200 flex-shrink-0">
                    🖥️ 퀘이사존
                </button>
            </div>
        </div>

        <!-- 필터 및 정렬 (접기 가능한 패널) -->
        <div class="glass-morphism rounded-2xl mb-4 shadow-lg overflow-hidden">
            <!-- 필터 헤더 (모바일에서 접기) -->
            <button id="filterToggle" onclick="toggleFilters()" class="w-full flex justify-between items-center p-3 sm:hidden border-b border-gray-200 dark:border-gray-700">
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300">🔍 필터</span>
                <svg id="filterToggleIcon" class="w-5 h-5 text-gray-500 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </button>
            
            <!-- 필터 컨텐츠 -->
            <div id="filterContent" class="p-3 sm:p-4">
                <div class="flex flex-wrap items-center gap-3">
                    <!-- 카테고리 -->
                    <div class="flex items-center gap-1.5">
                        <span class="text-xs sm:text-sm text-gray-600 dark:text-gray-400">📂</span>
                        <select id="categoryFilter" class="px-2 py-1.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-purple-500">
                            <option value="all">전체카테고리</option>
                            <option value="가전/디지털">📱 가전/디지털</option>
                            <option value="신세계/아웃렛">👟 신세계/아웃렛</option>
                            <option value="뷰티/화장품">💄 뷰티/화장품</option>
                            <option value="식품/건강">🍎 식품/건강</option>
                            <option value="가구/인테리어">🏠 가구/인테리어</option>
                            <option value="게임/취미">🎮 게임/취미</option>
                            <option value="기타">📦 기타</option>
                        </select>
                    </div>
                    
                    <!-- 가격 범위 -->
                    <div class="flex items-center gap-1.5">
                        <span class="text-xs sm:text-sm text-gray-600 dark:text-gray-400">💰</span>
                        <select id="priceRangeFilter" class="px-2 py-1.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-purple-500">
                            <option value="all">전체가격</option>
                            <option value="0-5만">0~5만</option>
                            <option value="5-10만">5~10만</option>
                            <option value="10-20만">10~20만</option>
                            <option value="20만+">20만+</option>
                        </select>
                    </div>
                    
                    <!-- 무료배송 -->
                    <label class="flex items-center gap-1.5 cursor-pointer">
                        <input type="checkbox" id="shippingFreeFilter" class="w-4 h-4 text-purple-600 rounded border-gray-300 focus:ring-purple-500">
                        <span class="text-xs sm:text-sm text-gray-600 dark:text-gray-400">🚚무료배송</span>
                    </label>
                    
                    <!-- 정렬 -->
                    <div class="flex items-center gap-1.5 ml-auto">
                        <select id="sortOrder" class="px-2 py-1.5 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-purple-500">
                            <option value="latest">🕐 최신</option>
                            <option value="oldest">📅 오래된</option>
                        </select>
                    </div>
                </div>
                
                <!-- 초기화 버튼 (데스크톱) -->
                <button onclick="resetFilters()" class="hidden sm:block w-full mt-2 py-1.5 text-xs text-purple-600 dark:text-purple-400 hover:bg-purple-50 dark:hover:bg-gray-800 rounded-lg transition-colors sm:w-auto">
                    🔄 필터 초기화
                </button>
            </div>
        </div>
        
        <!-- 핫딜 리스트 -->
        <div id="hotdeal-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            <div class="glass-morphism p-6 text-center rounded-2xl shadow-lg col-span-full">
                <div class="flex justify-center gap-1 mb-2">
                    <span class="paw-print">🐾</span>
                    <span class="paw-print">🐾</span>
                    <span class="paw-print">🐾</span>
                </div>
                <p class="text-gray-500 text-sm">딜냥이가 핫딜을 물어오는 중...</p>
            </div>
        </div>
        
        <!-- 페이지네이션 -->
        <div id="pagination" class="mt-4"></div>
        
        <!-- 푸터 -->
        <div class="text-center mt-6 mb-2 text-xs text-gray-500 dark:text-gray-400">
            <p>🐱 딜냥이 | 핫딜 정보를 합리적으로!</p>
        </div>
    </div>

    <script>
        // 네이버 로그인
        async function naverLogin() {
            const response = await fetch('/api/auth/naver/login');
            const data = await response.json();
            window.location.href = data.url;
        }
        
        // 로그아웃
        async function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                try {
                    await fetch('/api/auth/logout', { method: 'POST' });
                } catch (error) {
                    console.error('로그아웃 실패:', error);
                }
                location.reload();
            }
        }
        
        // 페이지 로드 시 로그인 상태 확인
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/api/auth/me');
                
                if (response.ok) {
                    const user = await response.json();
                    
                    document.getElementById('loginBtn').classList.add('hidden');
                    document.getElementById('userInfo').classList.remove('hidden');
                    document.getElementById('username').textContent = user.username;
                    document.getElementById('userEmail').textContent = user.email;
                    
                    if (user.profile_image && user.profile_image.trim()) {
                        document.getElementById('profileImg').src = user.profile_image;
                        document.getElementById('profileImg').classList.remove('hidden');
                        document.getElementById('profileInitial').style.display = 'none';
                    } else {
                        document.getElementById('profileInitial').textContent = user.username.charAt(0).toUpperCase();
                    }
                }
            } catch (error) {
                console.error('유저 정보 로드 실패:', error);
            }
        });
        
        // 댓글 모달
        let currentDealId = null;
        
        async function openCommentModal(dealId, dealTitle) {
            currentDealId = dealId;
            const modal = document.getElementById('commentModal');
            const modalTitle = document.getElementById('commentModalTitle');
            const commentList = document.getElementById('commentList');
            const commentInput = document.getElementById('commentInput');
            
            modalTitle.textContent = dealTitle ? dealTitle.substring(0, 30) + '...' : '댓글';
            commentInput.value = '';
            commentList.innerHTML = '<div class="text-center py-4 text-gray-500">로딩 중...</div>';
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            
            await loadComments(dealId);
        }
        
        async function loadComments(dealId) {
            const commentList = document.getElementById('commentList');
            try {
                const response = await fetch(`/api/deals/${dealId}/comments`);
                const data = await response.json();
                
                if (data.comments.length === 0) {
                    commentList.innerHTML = '<div class="text-center py-4 text-gray-500"> 아직 댓글이 없어요. 첫 댓글을 달아보세요! </div>';
                } else {
                    commentList.innerHTML = data.comments.map(c => `
                        <div class="p-3 bg-white/50 dark:bg-gray-800/50 rounded-lg">
                            <div class="flex items-center justify-between mb-1">
                                <span class="font-semibold text-sm text-purple-600 dark:text-purple-400">@${escapeHtml(c.author_name)}</span>
                                <span class="text-xs text-gray-400">${formatTimeAgo(c.created_at)}</span>
                            </div>
                            <p class="text-sm text-gray-700 dark:text-gray-300">${escapeHtml(c.content)}</p>
                            ${c.user_id == window.currentUserId ? `<button onclick="deleteComment(${c.id})" class="text-xs text-red-500 mt-1">삭제</button>` : ''}
                        </div>
                    `).join('');
                }
            } catch (error) {
                commentList.innerHTML = '<div class="text-center py-4 text-red-500"> 댓글 로드 실패 </div>';
            }
        }
        
        async function submitComment() {
            const commentInput = document.getElementById('commentInput');
            const content = commentInput.value.trim();
            
            if (!content) {
                alert('댓글 내용을 입력해주세요.');
                return;
            }
            
            try {
                const token = getAccessToken();
                const response = await fetch(`/api/deals/${currentDealId}/comments`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Access-Token': token || ''
                    },
                    body: JSON.stringify({ content })
                });
                
                if (response.status === 401) {
                    alert('로그인이 필요합니다.');
                    return;
                }
                
                if (response.ok) {
                    commentInput.value = '';
                    await loadComments(currentDealId);
                } else {
                    alert('댓글 작성에 실패했습니다.');
                }
            } catch (error) {
                alert('댓글 작성에 실패했습니다.');
            }
        }
        
        async function deleteComment(commentId) {
            if (!confirm('댓글을 삭제할까요?')) return;
            
            try {
                const token = getAccessToken();
                const response = await fetch(`/api/comments/${commentId}`, {
                    method: 'DELETE',
                    headers: { 'X-Access-Token': token || '' }
                });
                
                if (response.ok) {
                    await loadComments(currentDealId);
                } else {
                    alert('삭제 권한이 없습니다.');
                }
            } catch (error) {
                alert('삭제에 실패했습니다.');
            }
        }
        
        function closeCommentModal() {
            const modal = document.getElementById('commentModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
            currentDealId = null;
        }
        
        // Telegram 설정 모달
        function openTelegramSettings() {
            const modal = document.getElementById('telegramModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            loadTelegramSettings();
        }
        
        function closeTelegramModal() {
            const modal = document.getElementById('telegramModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
        }
        
        async function loadTelegramSettings() {
            const chatIdInput = document.getElementById('telegramChatId');
            const statusDiv = document.getElementById('telegramStatus');
            
            chatIdInput.value = '';
            statusDiv.innerHTML = '';
        }
        
        async function registerTelegram() {
            const chatIdInput = document.getElementById('telegramChatId');
            const chatId = chatIdInput.value.trim();
            
            if (!chatId) {
                showToast('Telegram Chat ID를 입력해주세요.', 'info');
                return;
            }
            
            const selectedCategories = Array.from(document.querySelectorAll('#telegramCategories input:checked')).map(cb => cb.value);
            const keywordInput = document.getElementById('telegramKeywords');
            const keywords = keywordInput.value.split(',').map(k => k.trim()).filter(k => k);
            
            try {
                const response = await fetch('/api/telegram/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        categories: selectedCategories,
                        keywords: keywords
                    })
                });
                
                if (response.ok) {
                    showToast('Telegram 알림이 설정되었습니다!', 'success');
                    closeTelegramModal();
                } else {
                    showToast('설정에 실패했습니다.', 'error');
                }
            } catch (error) {
                showToast('설정에 실패했습니다.', 'error');
            }
        }
        
        function getAccessToken() {
            return document.cookie.split('; ').find(row => row.startsWith('access_token='))?.split('=')[1];
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatTimeAgo(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            
            if (diff < 60) return '방금';
            if (diff < 3600) return Math.floor(diff / 60) + '분 전';
            if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
            return Math.floor(diff / 86400) + '일 전';
        }
    </script>
    
    <!-- 댓글 모달 -->
    <div id="commentModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md max-h-[80vh] flex flex-col overflow-hidden">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <h3 class="font-bold text-gray-800 dark:text-gray-200">💬 <span id="commentModalTitle">댓글</span></h3>
                <button onclick="closeCommentModal()" class="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="commentList" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                <div class="flex gap-2">
                    <input type="text" id="commentInput" placeholder="댓글을 입력하세요..."
                        class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200"
                        onkeypress="if(event.key==='Enter') submitComment()">
                    <button onclick="submitComment()" class="px-4 py-2 bg-gradient-to-r from-purple-500 to-blue-500 text-white rounded-xl text-sm font-semibold active:scale-95">
                        전송
                    </button>
                </div>
                <p class="text-xs text-gray-500 mt-2 text-center">💡 댓글 작성은 네이버 로그인이 필요합니다.</p>
            </div>
        </div>
    </div>
    
    <!-- Telegram 설정 모달 -->
    <div id="telegramModal" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md overflow-hidden">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between">
                <h3 class="font-bold text-gray-800 dark:text-gray-200">📱 Telegram 알림 설정</h3>
                <button onclick="closeTelegramModal()" class="p-2 text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="p-4 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Telegram Chat ID</label>
                    <input type="text" id="telegramChatId" placeholder="예: 123456789"
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200">
                    <p class="text-xs text-gray-500 mt-1">@DealCatBot 에서 /start 후 Chat ID를 입력하세요.</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">관심 카테고리</label>
                    <div id="telegramCategories" class="grid grid-cols-2 gap-2 text-xs">
                        <label class="flex items-center gap-2 p-2 bg-gray-50 dark:bg-gray-700 rounded-lg cursor-pointer">
                            <input type="checkbox" value="가전/디지털" class="rounded"> 📱 가전/디지털
                        </label>
                        <label class="flex items-center gap-2 p-2 bg-gray-50 dark:bg-gray-700 rounded-lg cursor-pointer">
                            <input type="checkbox" value="신세계/아웃렛" class="rounded"> 👟 신세계/아웃렛
                        </label>
                        <label class="flex items-center gap-2 p-2 bg-gray-50 dark:bg-gray-700 rounded-lg cursor-pointer">
                            <input type="checkbox" value="뷰티/화장품" class="rounded"> 💄 뷰티/화장품
                        </label>
                        <label class="flex items-center gap-2 p-2 bg-gray-50 dark:bg-gray-700 rounded-lg cursor-pointer">
                            <input type="checkbox" value="식품/건강" class="rounded"> 🍎 식품/건강
                        </label>
                        <label class="flex items-center gap-2 p-2 bg-gray-50 dark:bg-gray-700 rounded-lg cursor-pointer">
                            <input type="checkbox" value="가구/인테리어" class="rounded"> 🏠 가구/인테리어
                        </label>
                        <label class="flex items-center gap-2 p-2 bg-gray-50 dark:bg-gray-700 rounded-lg cursor-pointer">
                            <input type="checkbox" value="게임/취미" class="rounded"> 🎮 게임/취미
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">관심 키워드</label>
                    <input type="text" id="telegramKeywords" placeholder="예: 노트북, 무료배송, 세일"
                        class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 bg-white dark:bg-gray-700 text-gray-800 dark:text-gray-200">
                    <p class="text-xs text-gray-500 mt-1">쉼표로 구분하여 입력하세요.</p>
                </div>
                <div id="telegramStatus" class="text-sm text-center"></div>
                <button onclick="registerTelegram()" class="w-full py-2 bg-gradient-to-r from-purple-500 to-blue-500 text-white rounded-xl text-sm font-semibold active:scale-95">
                    저장하기
                </button>
            </div>
        </div>
    </div>
    
    <script src="/main.js" defer></script>
</body>
</html>
